<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#111827" />
    <title>Jump Timing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Jump Timing">
      <canvas id="game" aria-label="ジャンプタイミングゲーム"></canvas>

      <section class="hud" aria-label="ゲーム情報">
        <div>
          <span class="label">SCORE</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">BEST</span>
          <strong id="best">0</strong>
        </div>
        <div>
          <span class="label">BOOST</span>
          <strong id="boost">0</strong>
        </div>
      </section>

      <section id="overlay" class="overlay">
        <h1>JUMP TIMING</h1>
        <p id="message">タップでジャンプ。障害物のリズムを読んで進もう。</p>
        <button id="startButton" type="button">START</button>
      </section>
    </main>

    <script src="game.js?v=vertical-jump-clear-5"></script>
  </body>
</html>
